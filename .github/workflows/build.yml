name: Build PixelIMS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    # The official Gradle action automatically handles caching and setup
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
          
    - name: Make gradlew executable
      run: chmod +x ./gradlew
        
    - name: Build with Gradle
      run: ./gradlew assembleRelease --stacktrace --no-daemon
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PixelIMS-release
        # Note: Depending on signing config, it might be named app-release-unsigned.apk
        path: app/build/outputs/apk/release/*.apk 
        if-no-files-found: error
