name: Build PixelIMS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
        
    # This officially installs Gradle 8.9 and adds it to the PATH
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        gradle-version: '8.9'

    # Dynamically fixes the version catalog error without permanently modifying the code
    - name: CI Workaround for settings.gradle.kts
      run: sed -i 's/create("libs")/create("libsci")/g' settings.gradle.kts
        
    # Notice we are using 'gradle' instead of './gradlew'
    - name: Build with Gradle
      run: gradle assembleRelease --stacktrace --no-daemon
      
    - name: Upload APK
      uses: actions/upload-artifact@v7
      with:
        name: PixelIMS-release
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: error
